*{box-sizing:border-box;margin:0;padding:0}

.outer{max-width:900px;margin:0 auto;padding:1.5rem 1rem}
.nav{display:flex;gap:0;border-bottom:2px solid #181313;margin-bottom:1.5rem;overflow-x:auto;background:#fff}
.ntab{padding:10px 16px;font-size:12px;font-weight:500;cursor:pointer;border:none;background:transparent;color:#888;border-bottom:3px solid transparent;margin-bottom:-2px;white-space:nowrap;letter-spacing:.02em;transition:all .15s}
.ntab.on{color:#E53225;border-bottom-color:#E53225}
.ntab:hover:not(.on){color:#181313}
.pnl{display:none}.pnl.on{display:block}
.card{background:#fff;border:1px solid #e0ddd6;border-radius:4px;padding:20px 22px;position:relative;margin-bottom:16px}
.card::before{content:'';position:absolute;top:0;left:0;width:4px;height:100%;background:#E53225;border-radius:4px 0 0 4px}
.hero{display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:16px}
.hcard-label{font-size:10px;color:#888;margin-bottom:4px;text-transform:uppercase;letter-spacing:.08em}
.hcard-val{font-size:30px;font-weight:500;color:#181313;line-height:1.1}
.hcard-unit{font-size:11px;color:#aaa;margin-top:2px}
.hcard-rows{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid #ebe9e4}
.mini-label{font-size:10px;color:#888;margin-bottom:3px;letter-spacing:.03em}
.mini-val{font-size:18px;font-weight:500}
.badge{display:inline-block;padding:3px 9px;border-radius:2px;font-size:11px;font-weight:500;margin-top:5px}
.ok{background:#181313;color:#fff}.ng{background:#E53225;color:#fff}
.sec-label{font-size:10px;font-weight:500;color:#888;text-transform:uppercase;letter-spacing:.1em;border-left:3px solid #E53225;padding-left:8px;margin:20px 0 12px}
.prog-row{margin-bottom:14px}
.prog-head{display:flex;justify-content:space-between;align-items:baseline;margin-bottom:6px}
.prog-name{font-size:13px;color:#181313;font-weight:500}
.prog-meta{font-size:11px;color:#aaa}
.prog-pct{font-size:13px;font-weight:500;margin-left:8px}
.bar-bg{height:7px;background:#ebe9e4;position:relative;overflow:visible;border-radius:2px}
.bar-fill{height:100%;border-radius:2px}
.divider{height:1px;background:#ebe9e4;margin:18px 0}
.leg{display:flex;flex-wrap:wrap;gap:14px;font-size:11px;color:#888;margin-bottom:10px}
.leg span{display:flex;align-items:center;gap:5px}
.dot{width:9px;height:9px;flex-shrink:0;border-radius:1px}
.chart-wrap{position:relative;width:100%;height:250px;margin-top:4px}
.kpi-strip{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}
.kpi-box{background:#fff;border:1px solid #e0ddd6;border-radius:4px;padding:12px 14px;text-align:center}
.kpi-box-label{font-size:10px;color:#888;margin-bottom:4px;letter-spacing:.04em}
.kpi-box-val{font-size:20px;font-weight:500;color:#181313}
.kpi-box-sub{font-size:11px;margin-top:3px}
.tbl-card{background:#fff;border:1px solid #e0ddd6;border-radius:4px;overflow:hidden;margin-bottom:20px}
.tbl-head-bar{background:#181313;padding:10px 16px;display:flex;justify-content:space-between;align-items:center}
.tbl-head-bar span{font-size:12px;color:#fff;font-weight:500;letter-spacing:.04em}
.tbl-wrap{overflow-x:auto}

/* テーブル本体 */
table.dt{width:100%;border-collapse:collapse;font-size:12px;min-width:660px}
table.dt td,table.dt th{padding:7px 11px;white-space:nowrap;border-bottom:1px solid #f0ede8;border-right:1px solid #f0ede8}
table.dt td:last-child,table.dt th:last-child{border-right:none}
table.dt tbody tr:hover td{background:#fdf9f8}
table.dt tr.total-row td{background:#f8f6f3;font-weight:500;border-top:2px solid #181313;border-bottom:none}

/* ヘッダー段 */
table.dt thead tr.grp th{font-size:11px;font-weight:500;text-align:center;padding:6px 8px;color:#fff;letter-spacing:.04em}
table.dt thead tr.sub th{font-size:10px;font-weight:500;text-align:right;padding:5px 11px;color:#ddd;letter-spacing:.03em}
table.dt thead tr.sub th:first-child,table.dt thead tr.grp th:first-child{text-align:left}
table.dt td{text-align:right;color:#181313}
table.dt td:first-child{text-align:left}

/* 売上ゾーン（赤系ヘッダー） */
.th-s{background:#7a1a10}
/* 粗利ゾーン（青系ヘッダー） */
.th-p{background:#1a3a6b}
/* 基本ヘッダー */
.th-base{background:#2c2c2a}
/* 列背景うっすら */
table.dt td.col-s{background:#fffbfb}
table.dt td.col-p{background:#f7faff}
table.dt tr.total-row td.col-s{background:#fff0ee}
table.dt tr.total-row td.col-p{background:#edf2ff}

/* 達成率バッジ */
.rb{display:inline-block;padding:2px 7px;border-radius:2px;font-size:11px;font-weight:500;min-width:52px;text-align:center}
.rb-ok{background:#e8f4e8;color:#1a6b1a}
.rb-ng{background:#fdeaea;color:#c0392b}
.rb-na{background:#f0ede8;color:#aaa}
/* 差異 */
.dp{color:#1a6b1a;font-weight:500}
.dn{color:#E53225;font-weight:500}
.dz{color:#aaa}
</style>

function rb(r){
  if(r==='--'||r===null||r===undefined||r==='-')return`<span class="rb rb-na">--</span>`;
  const x=parseFloat(r);
  if(isNaN(x))return`<span class="rb rb-na">${r}</span>`;
  return`<span class="rb ${x>=100?'rb-ok':'rb-ng'}">${x.toFixed(1)}%</span>`;
}
function dc(v){
  if(v===null||v===undefined||v==='--')return'<td class="dz">--</td>';
  const x=parseFloat(v);
  if(isNaN(x))return`<td class="dz">${v}</td>`;
  if(x>0)return`<td class="dp">+${x.toLocaleString()}</td>`;
  if(x<0)return`<td class="dn">${x.toLocaleString()}</td>`;
  return`<td class="dz">0</td>`;
}
function sc(v,cls=''){return`<td class="col-s${cls?'':''}">${typeof v==='number'?v.toLocaleString():v}</td>`;}
function pc(v,cls=''){return`<td class="col-p">${typeof v==='number'?v.toLocaleString():v}</td>`;}

    const t=K2[K2.length-1];
    buildKpiStrip({sj:t.sj,sr:t.sr,pj:t.pj,pr:t.pr},'kpi_k2');
    document.getElementById('tbl_k2').innerHTML=kojinTableHTML(K2,true);

  p_a2:()=>{

};

function sw(pid,btn){
  document.querySelectorAll('.pnl').forEach(p=>p.classList.remove('on'));
  document.querySelectorAll('.ntab').forEach(t=>t.classList.remove('on'));
  document.getElementById(pid).classList.add('on');
  btn.classList.add('on');
  if(!initialized[pid]){initialized[pid]=true;INIT[pid]&&INIT[pid]();}
}
initialized['p_apr']=true;INIT['p_apr']();
